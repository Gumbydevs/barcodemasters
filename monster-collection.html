<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' https://apis.google.com https://www.gstatic.com 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://www.googleapis.com;
        frame-src 'self' https://accounts.google.com https://www.gstatic.com;
        img-src 'self' data:;
    ">
    <title>Monster Collection - Barcode Masters</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://apis.google.com/js/platform.js" async defer></script>
</head>
<body>
    <h1>Welcome to Barcode Masters - Monster Collection</h1>
    
    <!-- Display the Google Sign-In button if the player is not signed in -->
    <div id="signin-section">
        <button id="google-signin-button">Sign in with Google</button>
    </div>

    <!-- Display player info -->
    <div id="player-info" style="display: none;">
        <h3>Player Profile</h3>
        <p id="player-name"></p>
        <p id="player-id"></p>
    </div>

    <!-- Monster collection section -->
    <div id="monster-collection" style="display: none;">
        <h2>Your Monsters</h2>
        <ul id="monster-list"></ul>
    </div>

    <script>
        let gapiInitialized = false;
        const clientId = '472252081207-mpmsv3vd6p2ej50cokl2a0jhiepla90t.apps.googleusercontent.com'; // Your Client ID
        const apiKey = 'AIzaSyAvSQBek_khqKh5ZEYhWcqlF0taRg_Q1R4'; // Your API Key
        const spreadsheetId = 'YOUR_SPREADSHEET_ID'; // Replace with your actual spreadsheet ID
        const range = 'Sheet1!A1:D100'; // Define the range where player and monster info are stored

        // Load Google API client
        function handleClientLoad() {
            gapi.load('client:auth2', initClient);
        }

        // Initialize Google API client
        function initClient() {
            gapi.client.init({
                apiKey: apiKey,
                clientId: clientId,
                discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"],
                scope: "https://www.googleapis.com/auth/spreadsheets.readonly"
            }).then(() => {
                gapiInitialized = true;
                const authInstance = gapi.auth2.getAuthInstance();
                authInstance.isSignedIn.listen(updateSigninStatus);
                updateSigninStatus(authInstance.isSignedIn.get());
            }).catch((error) => {
                console.error("Error initializing Google API:", error);
            });
        }

        // Update sign-in status
        function updateSigninStatus(isSignedIn) {
            if (isSignedIn) {
                const authInstance = gapi.auth2.getAuthInstance();
                const user = authInstance.currentUser.get();
                document.getElementById("player-name").innerText = "Welcome, " + user.getBasicProfile().getName();
                document.getElementById("player-id").innerText = "Player ID: " + user.getId();
                document.getElementById("player-info").style.display = "block";
                loadMonsterCollection();
            } else {
                document.getElementById("signin-section").style.display = "block";
            }
        }

        // Handle Google Sign-In button click
        function handleSignInClick() {
            const authInstance = gapi.auth2.getAuthInstance();
            authInstance.signIn().then(() => {
                console.log("Signed in successfully");
            }).catch((error) => {
                console.error("Sign-in failed", error);
            });
        }

        // Load Monster Collection data from Google Sheets
        function loadMonsterCollection() {
            if (!gapiInitialized) return;

            gapi.client.sheets.spreadsheets.values.get({
                spreadsheetId: spreadsheetId,
                range: range,
            }).then(response => {
                const rows = response.result.values;
                if (rows.length > 0) {
                    const listElement = document.getElementById("monster-list");
                    rows.forEach(row => {
                        // Assume columns: Monster Name, Level, Attack, Defense
                        const listItem = document.createElement("li");
                        listItem.innerText = `Name: ${row[0]}, Level: ${row[1]}, Attack: ${row[2]}, Defense: ${row[3]}`;
                        listElement.appendChild(listItem);
                    });
                    document.getElementById("monster-collection").style.display = "block";
                } else {
                    console.log("No data found.");
                }
            }).catch(error => {
                console.error("Error fetching data from Google Sheets:", error);
            });
        }

        // Attach event listener to sign-in button
        document.getElementById("google-signin-button").addEventListener("click", handleSignInClick);

        // Load the Google API client library
        handleClientLoad();
    </script>
</body>
</html>
