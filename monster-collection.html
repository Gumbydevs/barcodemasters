<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://lh3.googleusercontent.com; style-src 'self';">
  <title>Barcode Masters - Monster Collection - Version 1.01165</title>
  <link rel="stylesheet" href="styles.css"> <!-- External stylesheet to avoid CSP issues -->
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .main-header {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 20px;
      background-color: #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }
    header img {
      width: 275px;
      height: 264px;
    }
    .collection-container {
      width: 90%;
      max-width: 1200px;
      background-color: #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      padding: 20px;
    }
    .monster-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin: 10px;
      width: 200px;
    }
    .monster-image {
      width: 100px;
      height: 100px;
      background-color: #d0d0d0;
      border-radius: 50%;
      margin-bottom: 10px;
    }
    .monster-info {
      text-align: left;
      width: 100%;
    }
    .monster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .button {
      padding: 12px 25px;
      font-size: 16px;
      margin: 10px 0;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    .button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="main-header">
    <header>
      <img src="BarcodeLogo1.PNG" alt="Barcode Masters Logo">
    </header>
  </div>

  <h1>Your Monster Collection</h1>
  <div class="collection-container">
    <div id="monsterGrid" class="monster-grid"></div>
  </div>

  <button class="button" onclick="window.location.href='home.html'">Back to Home</button>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      console.log("Monster Collection Page Loaded");

      const spreadsheetId = "YOUR_SPREADSHEET_ID_HERE"; // Replace with your spreadsheet ID
      const apiKey = "YOUR_API_KEY_HERE"; // Replace with your API key
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet1?key=${apiKey}`;

      async function fetchMonsters() {
        try {
          const response = await fetch(url);
          const data = await response.json();
          renderMonsters(data.values);
        } catch (error) {
          console.error("Error fetching monster data:", error);
        }
      }

      function renderMonsters(monsters) {
        const monsterGrid = document.getElementById("monsterGrid");
        monsterGrid.innerHTML = ""; // Clear existing content

        monsters.slice(1).forEach(monster => { // Skip header row
          const [name, type, level, experience, image] = monster;

          const card = document.createElement("div");
          card.className = "monster-card";

          const monsterImage = document.createElement("img");
          monsterImage.className = "monster-image";
          monsterImage.src = image || "default-monster.png"; // Fallback image
          monsterImage.alt = `${name} Image`;

          const info = document.createElement("div");
          info.className = "monster-info";
          info.innerHTML = `
            <p><strong>Name:</strong> ${name}</p>
            <p><strong>Type:</strong> ${type}</p>
            <p><strong>Level:</strong> ${level}</p>
            <p><strong>Experience:</strong> ${experience}</p>
          `;

          card.appendChild(monsterImage);
          card.appendChild(info);
          monsterGrid.appendChild(card);
        });
      }

      fetchMonsters();
    });
  </script>
</body>
</html>
