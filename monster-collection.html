<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' https://apis.google.com https://www.gstatic.com 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://www.googleapis.com;
        frame-src 'self' https://accounts.google.com https://www.gstatic.com;
        img-src 'self' data:;
    ">
    <title>Monster Collection - Barcode Masters</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1, h2, h3 {
            color: #555;
        }
        #signin-section, #player-info, #monster-collection {
            margin: 20px 0;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        button {
            padding: 10px 20px;
            background: #007BFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: #eef;
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
    <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
    <h1>Welcome to Barcode Masters - Monster Collection</h1>
    
    <!-- Custom-styled Sign-In Button -->
    <div id="signin-section">
        <button id="custom-signin-button">Sign In to View Your Profile</button>
    </div>

    <!-- Player info section -->
    <div id="player-info" style="display: none;">
        <h3>Player Profile</h3>
        <p id="player-name"></p>
        <p id="player-id"></p>
    </div>

    <!-- Monster collection section -->
    <div id="monster-collection" style="display: none;">
        <h2>Your Monsters</h2>
        <ul id="monster-list"></ul>
    </div>

    <script>
        const clientId = '472252081207-mpmsv3vd6p2ej50cokl2a0jhiepla90t.apps.googleusercontent.com';
        const apiKey = 'AIzaSyAvSQBek_khqKh5ZEYhWcqlF0taRg_Q1R4';
        const spreadsheetId = 'YOUR_SPREADSHEET_ID'; // Replace with actual Spreadsheet ID
        const range = 'Sheet1!A1:D100'; // Define the range

        // Initialize Google API Client
        function handleClientLoad() {
            gapi.load('client:auth2', initClient);
        }

        function initClient() {
            gapi.client.init({
                apiKey: apiKey,
                clientId: clientId,
                discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"],
                scope: "https://www.googleapis.com/auth/spreadsheets.readonly"
            }).then(() => {
                const authInstance = gapi.auth2.getAuthInstance();
                authInstance.isSignedIn.listen(updateSigninStatus);
                updateSigninStatus(authInstance.isSignedIn.get());
            }).catch(error => console.error('Error initializing Google API:', error));
        }

        function updateSigninStatus(isSignedIn) {
            if (isSignedIn) {
                document.getElementById("signin-section").style.display = "none";
                const user = gapi.auth2.getAuthInstance().currentUser.get();
                document.getElementById("player-name").innerText = "Welcome, " + user.getBasicProfile().getName();
                document.getElementById("player-id").innerText = "Player ID: " + user.getId();
                document.getElementById("player-info").style.display = "block";
                loadMonsterCollection();
            } else {
                document.getElementById("signin-section").style.display = "block";
            }
        }

        function handleSignInClick() {
            gapi.auth2.getAuthInstance().signIn().catch(error => console.error('Sign-in failed:', error));
        }

        function loadMonsterCollection() {
            gapi.client.sheets.spreadsheets.values.get({
                spreadsheetId: spreadsheetId,
                range: range,
            }).then(response => {
                const rows = response.result.values;
                const list = document.getElementById("monster-list");
                if (rows.length > 0) {
                    rows.forEach(row => {
                        const li = document.createElement('li');
                        li.innerText = `Name: ${row[0]}, Level: ${row[1]}, Attack: ${row[2]}, Defense: ${row[3]}`;
                        list.appendChild(li);
                    });
                    document.getElementById("monster-collection").style.display = "block";
                }
            }).catch(error => console.error('Error loading data:', error));
        }

        document.getElementById("custom-signin-button").addEventListener("click", handleSignInClick);

        // Load Google API
        handleClientLoad();
    </script>
</body>
</html>
