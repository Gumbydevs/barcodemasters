<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self'; 
    script-src 'self' https://apis.google.com https://www.gstatic.com 'unsafe-inline' 'unsafe-eval';
    connect-src 'self' https://www.googleapis.com https://content-sheets.googleapis.com;
    frame-src 'self' https://accounts.google.com https://www.gstatic.com;
    img-src 'self' data:;
  ">
  <title>Barcode Masters - Monster Collection - Version 1.01165</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .main-header {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 80%;
      padding: 20px;
      background-color: #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }
    header img {
      width: 275px;
      height: 264px;
    }
    .player-info {
      font-size: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      margin-left: 20px;
    }
    .player-info p {
      margin: 5px 0;
    }
    .player-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: #d0d0d0;
      margin-bottom: 10px;
    }
    .monster-list {
      width: 90%;
      max-width: 800px;
      margin: 20px auto;
      background-color: #ffffff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      padding: 20px;
    }
    .monster-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }
    .monster-item:last-child {
      border-bottom: none;
    }
    .monster-info {
      text-align: left;
    }
    .monster-info p {
      margin: 3px 0;
    }
    .button {
      padding: 12px 25px;
      font-size: 16px;
      margin: 5px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    .button:hover {
      background-color: #0056b3;
    }
    #version {
      font-size: 12px;
      color: gray;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="main-header">
    <header>
      <img src="BarcodeLogo1.PNG" alt="Barcode Masters Logo">
    </header>
    <div class="player-info">
      <img id="playerAvatar" class="player-avatar" src="default-avatar.png" alt="Player Avatar">
      <p><strong>Player Name:</strong> <span id="playerName">Player One</span></p>
      <p><strong>Player Email:</strong> <span id="playerEmail">player@example.com</span></p>
    </div>
  </div>

  <div class="monster-list" id="monsterList">
    <h2>Your Monsters</h2>
    <!-- Placeholder for dynamically loaded monsters -->
    <p>Loading your monster collection...</p>
  </div>

  <div id="version">Prototype Version 1.01165</div>
  <div style="font-size: 12px; color: gray; margin-top: 20px;">&copy; 2025 Barcode Masters. All rights reserved.</div>

  <script>
    console.log("Monster Collection Page Loaded");

    // Function to extract user data from ID token
    function parseJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }

    // Load player data from localStorage
    const userData = localStorage.getItem('userData');
    if (userData) {
      const user = parseJwt(userData);
      document.getElementById('playerName').textContent = user.name || "Player Name";
      document.getElementById('playerEmail').textContent = user.email || "Player Email";
      document.getElementById('playerAvatar').src = user.picture || "default-avatar.png";
    } else {
      console.log("No user data found in local storage");
    }

    // Simulate fetching monster data (replace with API call)
    const monsters = [
      { name: "Flareon", level: 12, type: "Fire", experience: 240 },
      { name: "Aqualix", level: 8, type: "Water", experience: 120 },
      { name: "Terradon", level: 15, type: "Earth", experience: 340 }
    ];

    const monsterList = document.getElementById('monsterList');
    monsterList.innerHTML = '<h2>Your Monsters</h2>';

    monsters.forEach(monster => {
      const monsterItem = document.createElement('div');
      monsterItem.classList.add('monster-item');

      monsterItem.innerHTML = `
        <div class="monster-info">
          <p><strong>Name:</strong> ${monster.name}</p>
          <p><strong>Level:</strong> ${monster.level}</p>
          <p><strong>Type:</strong> ${monster.type}</p>
        </div>
        <p><strong>EXP:</strong> ${monster.experience}</p>
      `;

      monsterList.appendChild(monsterItem);
    });
  </script>
</body>
</html>
